version: "3.9"

# ─── How to run ───────────────────────────────────────────────────────────────
#
#  Node A (local only, no tunnel):
#    docker-compose up --build
#
#  Node A (with Cloudflare Tunnel — requires credentials placed first):
#    docker-compose --env-file .env.node-a --profile tunnel up --build
#
#  Node B (local only):
#    docker-compose -p node-b --env-file .env.node-b up --build
#
#  Node B (with Cloudflare Tunnel):
#    docker-compose -p node-b --env-file .env.node-b --profile tunnel up --build
#
# See .env.node-a and .env.node-b for all configurable values.
# Tunnel setup: see cloudflared/config.node-a.yml and README.md § Cloudflare Tunnel
# ──────────────────────────────────────────────────────────────────────────────

networks:
  hilo-net:
    driver: bridge

volumes:
  graphdb-data:
  hilo-api-data:

services:

  # ── Triple store ─────────────────────────────────────────────────────────────
  graphdb:
    image: ontotext/graphdb:10.7.3
    container_name: hilo-${NODE_ID:-node-a}-graphdb
    ports:
      - "${GRAPHDB_PORT:-7200}:7200"
    volumes:
      - graphdb-data:/opt/graphdb/home
      - ./graphdb/config:/opt/graphdb/home/conf
    networks:
      - hilo-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7200/rest/repositories"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ── Create GraphDB repo on first boot ────────────────────────────────────────
  graphdb-init:
    image: curlimages/curl:8.11.0
    container_name: hilo-${NODE_ID:-node-a}-graphdb-init
    entrypoint: ["/bin/sh", "/scripts/init-graphdb.sh"]
    volumes:
      - ./scripts/init-graphdb.sh:/scripts/init-graphdb.sh:ro
      - ./graphdb/config:/graphdb-config:ro
    environment:
      GRAPHDB_URL: http://graphdb:7200
      REPO_ID: ${GRAPHDB_REPO:-hilo}
    networks:
      - hilo-net
    depends_on:
      graphdb:
        condition: service_healthy
    restart: "no"

  # ── Message broker ───────────────────────────────────────────────────────────
  queue:
    image: rabbitmq:3-management
    container_name: hilo-${NODE_ID:-node-a}-queue
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: hilo
      RABBITMQ_DEFAULT_PASS: hilo
    networks:
      - hilo-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── FastAPI ───────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
    container_name: hilo-${NODE_ID:-node-a}-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      HILO_GRAPHDB_URL: http://graphdb:7200
      HILO_GRAPHDB_REPOSITORY: ${GRAPHDB_REPO:-hilo}
      HILO_RABBITMQ_URL: amqp://hilo:hilo@queue:5672/
      HILO_RABBITMQ_MANAGEMENT_URL: http://queue:15672
      HILO_NODE_ID: ${NODE_ID:-node-a}
      HILO_NODE_NAME: ${NODE_NAME:-HILO Node}
      HILO_NODE_BASE_URL: ${NODE_BASE_URL:-http://localhost:8000}
      HILO_INTERNAL_KEY: ${INTERNAL_KEY:-dev}
    volumes:
      - hilo-api-data:/data
    networks:
      - hilo-net
    depends_on:
      graphdb:
        condition: service_healthy
      queue:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Queue consumer ────────────────────────────────────────────────────────────
  consumer:
    build:
      context: ./queue
    container_name: hilo-${NODE_ID:-node-a}-consumer
    environment:
      HILO_RABBITMQ_URL: amqp://hilo:hilo@queue:5672/
      HILO_NODE_ID: ${NODE_ID:-node-a}
      HILO_GRAPHDB_URL: http://graphdb:7200
      HILO_GRAPHDB_REPOSITORY: ${GRAPHDB_REPO:-hilo}
      HILO_API_URL: http://api:8000
    networks:
      - hilo-net
    depends_on:
      queue:
        condition: service_healthy
      graphdb:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Cloudflare Tunnel ────────────────────────────────────────────────────────
  # Exposes the API publicly via https://<NODE_ID>.hilosemantics.com
  #
  # Start with tunnel enabled:
  #   docker-compose --env-file .env.node-a --profile tunnel up --build
  #
  # Prerequisites (one-time per node):
  #   1. Create tunnel in Cloudflare Zero Trust dashboard → copy tunnel ID
  #   2. Place credentials JSON at cloudflared/credentials.node-a.json (git-ignored)
  #   3. Set tunnel ID in cloudflared/config.node-a.yml
  #
  # Without --profile tunnel the service is skipped — stack starts normally for
  # local development without Cloudflare credentials.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: hilo-${NODE_ID:-node-a}-cloudflared
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared/config.${NODE_ID:-node-a}.yml:/etc/cloudflared/config.yml:ro
      - ./cloudflared/credentials.${NODE_ID:-node-a}.json:/etc/cloudflared/credentials.json:ro
    networks:
      - hilo-net
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - tunnel

  # ── React UI ──────────────────────────────────────────────────────────────────
  ui:
    build:
      context: ./ui
    container_name: hilo-${NODE_ID:-node-a}-ui
    ports:
      - "${UI_PORT:-3000}:3000"
    environment:
      VITE_API_URL: http://localhost:${API_PORT:-8000}
      VITE_INTERNAL_KEY: ${INTERNAL_KEY:-dev}
    networks:
      - hilo-net
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
